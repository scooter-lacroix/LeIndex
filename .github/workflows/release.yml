name: Release

on:
  push:
    branches: [master]
    paths:
      # Only trigger when version-carrying or publishable files change
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'packages/**'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Detect version bump ──────────────────────────────────────────────
  detect:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      changed: ${{ steps.ver.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag listing and changelog

      - name: Extract version from Cargo.toml
        id: ver
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Fetch all tags explicitly (ensures tag list is accurate)
          git fetch --tags

          # Check if a tag for this version already exists
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${VERSION} already exists — skipping release"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version detected: v${VERSION}"
          fi

  # ── Build native binaries ────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: leindex
            asset_name: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: leindex
            asset_name: linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            binary: leindex
            asset_name: macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            binary: leindex
            asset_name: macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: leindex.exe
            asset_name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          STRIP="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            STRIP="aarch64-linux-gnu-strip"
          fi
          $STRIP target/${{ matrix.target }}/release/${{ matrix.binary }}

      - name: Rename binary for upload
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          EXT="${{ matrix.asset_name == 'windows-x86_64' && '.exe' || '' }}"
          ASSET="leindex-${VERSION}-${{ matrix.asset_name }}${EXT}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$ASSET"
          echo "ASSET=$ASSET" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.asset_name }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  # ── Create GitHub Release (draft) ────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: binary-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          shopt -s nullglob
          sha256sum leindex-* > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname | head -1)

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since ${PREV_TAG}:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}" >> CHANGELOG.md
          else
            echo "Initial release." >> CHANGELOG.md
          fi

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          name: v${{ needs.detect.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            release-artifacts/leindex-*
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ─────────────────────────────────────────────
  crates-io:
    name: Publish crates.io
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo login
        run: cargo login "${{ secrets.CARGO_REGISTRY_TOKEN }}"

      - name: Publish to crates.io
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm package (optional — skips if NPM_TOKEN not set) ─────
  npm:
    name: Publish npm
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/npm-leindex-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Check NPM_TOKEN availability
        id: check_token
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ NPM_TOKEN not set — skipping npm publish"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check_token.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version parity
        if: steps.check_token.outputs.available == 'true'
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NPM_VERSION=$(node -p "require('./package.json').version")
          if [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, package.json=$NPM_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Publish to npm
        if: steps.check_token.outputs.available == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish PyPI package (thin wrapper — installs binary via cargo) ──
  pypi:
    name: Publish PyPI
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pypi-leindex
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version parity
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYPI_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$CARGO_VERSION" != "$PYPI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, pyproject.toml=$PYPI_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        run: twine upload dist/* --non-interactive
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Final summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [detect, github-release, crates-io, npm, pypi]
    if: always() && needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish draft release
        if: needs.crates-io.result == 'success' && needs.pypi.result == 'success'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          gh release edit "v${VERSION}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "## 🚀 Release v${VERSION} Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| crates.io | ${{ needs.crates-io.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm | ${{ needs.npm.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PyPI | ${{ needs.pypi.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Registry notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **crates.io**: Publishes the Rust crate (required)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI**: Thin Python wrapper that bootstraps cargo install (required)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm**: Binary wrapper with GH Release download (optional — needs NPM_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
