name: Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      # Trigger when version-carrying, publishable, distribution, or release files change.
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'crates/**'
      - 'packages/**'
      - 'install.sh'
      - 'docs/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Detect version bump + per-surface publish status ──────────────────
  detect:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      needs_build: ${{ steps.ver.outputs.needs_build }}
      needs_crates: ${{ steps.ver.outputs.needs_crates }}
      needs_npm: ${{ steps.ver.outputs.needs_npm }}
      needs_pypi: ${{ steps.ver.outputs.needs_pypi }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify published-surface versions match
        run: |
          set -e
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          NPM_VER=$(python3 -c "import json; print(json.load(open('packages/npm-leindex-mcp/package.json'))['version'])" 2>/dev/null || echo "MISSING")
          PYPI_VER=$(python3 -c "import tomllib; print(tomllib.load(open('packages/pypi-leindex/pyproject.toml','rb'))['project']['version'])" 2>/dev/null || echo "MISSING")
          echo "Cargo: ${CARGO_VER}  npm: ${NPM_VER}  PyPI: ${PYPI_VER}"
          if [ "$CARGO_VER" != "$NPM_VER" ] || [ "$CARGO_VER" != "$PYPI_VER" ]; then
            echo "ERROR: Version mismatch! Cargo=$CARGO_VER npm=$NPM_VER PyPI=$PYPI_VER"
            exit 1
          fi
          echo "All versions match: ${CARGO_VER}"

      - name: Extract version and check per-surface publish status
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Fetch all tags explicitly (ensures tag list is accurate)
          git fetch --tags

          # ── Check crates.io ──
          if cargo search leindex-embed 2>/dev/null | grep -q "^leindex-embed = \"${VERSION}\""; then
            echo "crates.io: v${VERSION} already published"
            echo "needs_crates=false" >> "$GITHUB_OUTPUT"
          else
            echo "crates.io: v${VERSION} not yet published"
            echo "needs_crates=true" >> "$GITHUB_OUTPUT"
          fi

          # ── Check npm ──
          if npm view "@leindex/mcp@${VERSION}" version 2>/dev/null; then
            echo "npm: v${VERSION} already published"
            echo "needs_npm=false" >> "$GITHUB_OUTPUT"
          else
            echo "npm: v${VERSION} not yet published"
            echo "needs_npm=true" >> "$GITHUB_OUTPUT"
          fi

          # ── Check PyPI ──
          if pip install "leindex==${VERSION}" --dry-run 2>&1 | grep -q "Would install"; then
            echo "PyPI: v${VERSION} already published"
            echo "needs_pypi=false" >> "$GITHUB_OUTPUT"
          else
            echo "PyPI: v${VERSION} not yet published"
            echo "needs_pypi=true" >> "$GITHUB_OUTPUT"
          fi

          # ── Check GitHub Release ──
          RELEASE_EXISTS=false
          if gh release view "v${VERSION}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q false; then
            echo "GitHub Release: v${VERSION} already published (non-draft)"
            RELEASE_EXISTS=true
          else
            echo "GitHub Release: v${VERSION} not yet published or still draft"
          fi

          # ── Determine needs_build ──
          NEEDS_CRATES=$(grep '^needs_crates=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)
          NEEDS_NPM=$(grep '^needs_npm=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)
          NEEDS_PYPI=$(grep '^needs_pypi=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2)

          if [ "$NEEDS_CRATES" = "true" ] || [ "$NEEDS_NPM" = "true" ] || [ "$NEEDS_PYPI" = "true" ] || [ "$RELEASE_EXISTS" = "false" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "At least one surface needs publishing — build required"
          else
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "All surfaces already published at v${VERSION}"
          fi

  # ── Lint & test gate (runs before the platform matrix) ──────────────
  # VAL-RELEASE-014/015/016 require the release/gating CI to run
  # `cargo test --workspace`, `cargo clippy` with `-D warnings`, and
  # `cargo fmt --all --check` before any bundle is published. Running
  # these inline as a separate job lets the matrix fail fast and avoids
  # wasting cross-compile cycles when a unit test would have caught the
  # regression. The build job `needs: [detect, lint-and-test]` so a
  # failure here blocks bundle creation.
  lint-and-test:
    name: Lint & test
    needs: detect
    if: needs.detect.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-test-cargo-

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

      - name: cargo clippy --workspace --all-features
        run: cargo clippy --workspace --all-features -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  # ── Build native binaries (main + worker) ────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: [detect, lint-and-test]
    if: needs.detect.outputs.needs_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux-x86_64 is the AMD-targeted bundle: it ships the
          # MIGraphX-enabled ORT (`onnxruntime-migraphx`) so the AMD
          # execution provider path works out of the box on ROCm
          # systems. VAL-RELEASE-006 requires the providers_migraphx
          # and providers_shared .so files in this archive only.
          #
          # The MIGraphX wheel is published as `manylinux_2_34_x86_64`
          # (glibc 2.34+) by AMD; the CPU onnxruntime wheel is
          # `manylinux_2_28_x86_64` (glibc 2.28+). Each matrix row
          # pins the platform tag its target wheel actually uses, so
          # `pip download --platform` matches a real distribution.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: linux-x86_64
            ort_package: onnxruntime-migraphx
            ort_platform: manylinux_2_34_x86_64
            include_migraphx: 'true'

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: linux-aarch64
            ort_package: onnxruntime
            ort_platform: manylinux_2_28_aarch64
            include_migraphx: 'false'

          - target: x86_64-apple-darwin
            os: macos-13
            asset_name: macos-x86_64
            ort_package: onnxruntime
            ort_platform: macosx_13_0_x86_64
            include_migraphx: 'false'

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: macos-aarch64
            ort_package: onnxruntime
            ort_platform: macosx_14_0_arm64
            include_migraphx: 'false'

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: windows-x86_64
            ort_package: onnxruntime
            ort_platform: win_amd64
            include_migraphx: 'false'

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Download model assets
        shell: bash
        env:
          # Authenticated HuggingFace requests get a higher rate
          # limit per IP. The token is optional — when the
          # workflow has no `HF_TOKEN` secret, unauthenticated
          # requests still work, just with a tighter per-minute
          # cap that the retry policy below absorbs.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          export GH_TOKEN="${{ secrets.GITHUB_TOKEN }}"
          MODELS_DIR="models"
          mkdir -p "$MODELS_DIR"
          # Model assets are gitignored so checkout won't include them.
          # Try to fetch from a prior GitHub Release first, then HuggingFace.
          HF_REPO="onnx-community/Qwen3-Embedding-0.6B-ONNX"
          if [[ -f "$MODELS_DIR/qwen3-embed-0.6b.onnx" ]]; then
            echo "Model assets already present in repository"
          else
            echo "Model assets not in repo — attempting to fetch from prior release..."
            # Fetch latest non-draft release tag
            TAG=$(gh release list --limit 10 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName' | head -1)
            if [[ -n "$TAG" ]]; then
              echo "Downloading model assets from release $TAG..."
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "*.onnx" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "tokenizer.json" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "config.json" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "checksums.sha256" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "LICENSE" 2>/dev/null || true
              # Try to extract from prior release bundle if direct download failed
              if [[ ! -f "$MODELS_DIR/qwen3-embed-0.6b.onnx" ]]; then
                echo "Direct download failed — trying to extract from release bundle..."
                BUNDLE=$(gh release download "$TAG" --dir /tmp --pattern "leindex-*-linux-x86_64.tar.gz" 2>/dev/null && ls /tmp/leindex-*-linux-x86_64.tar.gz 2>/dev/null | head -1 || true)
                if [[ -z "$BUNDLE" || ! -f "$BUNDLE" ]]; then
                  echo "::warning::Prior release bundle not found — cannot extract models from previous release"
                fi
                if [[ -n "$BUNDLE" && -f "$BUNDLE" ]]; then
                  tar xzf "$BUNDLE" -C /tmp --strip-components=1 --wildcards "leindex-*/models/qwen3-embed-0.6b.onnx" "leindex-*/models/tokenizer.json" 2>/dev/null || true
                  cp /tmp/models/qwen3-embed-0.6b.onnx "$MODELS_DIR/" 2>/dev/null || true
                  cp /tmp/models/tokenizer.json "$MODELS_DIR/" 2>/dev/null || true
                fi
              fi
            fi
            # Fall back to HuggingFace download if still missing
            # HuggingFace serves from a CDN that returns HTTP 429
            # (Too Many Requests) under bursty CI load. The default
            # curl behaviour is to fail on the first 429, which
            # is what caused the 2026-06-02 memory-budget run to
            # fail. We:
            #   - retry up to 5 times on ANY error (the
            #     --retry-all-errors flag), so transient 429s are
            #     absorbed without manual re-runs
            #   - wait 15s between retries (--retry-delay) so we
            #     back off past the rate-limit window
            #   - cap each curl call at 5 minutes (--retry-max-time)
            #     so a wedged connection cannot stall the workflow
            #   - use --retry-connrefused so a CDN edge node that
            #     drops the TCP connection also triggers a retry
            #   - pass the token as a Bearer header when present
            #     (HF raises the per-IP cap for authenticated
            #     clients; absent the token, unauthenticated
            #     requests still work, just with tighter limits)
            HF_AUTH=()
            if [[ -n "${HF_TOKEN}" ]]; then
              HF_AUTH=(-H "Authorization: Bearer ${HF_TOKEN}")
            fi
            CURL_COMMON=(
              --fail
              --location
              --progress-bar
              --retry 5
              --retry-delay 15
              --retry-all-errors
              --retry-connrefused
              --retry-max-time 300
            )
            if [[ ! -f "$MODELS_DIR/qwen3-embed-0.6b.onnx" ]]; then
              echo "Downloading ONNX model from HuggingFace (${HF_REPO})..."
              curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
                -o "$MODELS_DIR/qwen3-embed-0.6b.onnx" \
                "https://huggingface.co/${HF_REPO}/resolve/main/onnx/model.onnx"
            fi
            if [[ ! -f "$MODELS_DIR/tokenizer.json" ]]; then
              echo "Downloading tokenizer from HuggingFace..."
              curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
                -o "$MODELS_DIR/tokenizer.json" \
                "https://huggingface.co/${HF_REPO}/resolve/main/tokenizer.json"
            fi
            if [[ ! -f "$MODELS_DIR/config.json" ]]; then
              echo "Downloading config from HuggingFace..."
              curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
                -o "$MODELS_DIR/config.json" \
                "https://huggingface.co/${HF_REPO}/resolve/main/config.json"
            fi
            if [[ ! -f "$MODELS_DIR/checksums.sha256" ]]; then
              echo "Downloading checksums from HuggingFace..."
              curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
                -o "$MODELS_DIR/checksums.sha256" \
                "https://huggingface.co/${HF_REPO}/resolve/main/checksums.sha256" \
                || true
            fi
            if [[ ! -f "$MODELS_DIR/LICENSE" ]]; then
              echo "Downloading LICENSE from HuggingFace..."
              curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
                -o "$MODELS_DIR/LICENSE" \
                "https://huggingface.co/${HF_REPO}/resolve/main/LICENSE" \
                || true
            fi
            echo "Model assets ready at $MODELS_DIR"
          fi

      # ── Extract ORT shared libs for the bundle's `lib/` directory ────
      # VAL-RELEASE-005/011: with the load-dynamic migration the CI build
      # no longer needs ORT at build time. The shared libraries that the
      # worker `dlopen`s at runtime are extracted from the platform-
      # appropriate onnxruntime wheel (onnxruntime-migraphx for linux-x86_64
      # so VAL-RELEASE-006 ships the MIGraphX provider) and staged under
      # /tmp/ort-extract/onnxruntime/capi/ for the Package step to copy.
      #
      # The ORT version is pinned to 1.25.0 to match the version the
      # `ort` crate (2.0.0-rc.12) was migrated against, the local dev
      # tooling, and the model file's expected ABI. Pinned == reproducible
      # bundles regardless of upstream point releases.
      - name: Set up Python (for ORT wheel extraction)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract ORT wheel for bundle lib/
        shell: bash
        env:
          ORT_VERSION: '1.25.0'
          ORT_PACKAGE: ${{ matrix.ort_package }}
          ORT_PLATFORM: ${{ matrix.ort_platform }}
          INCLUDE_MIGRAPHX: ${{ matrix.include_migraphx }}
        run: |
          set -e
          echo "Extracting ORT wheel for bundle lib/ ..."
          echo "  package=${ORT_PACKAGE} version=${ORT_VERSION} platform=${ORT_PLATFORM}"
          rm -rf /tmp/ort-wheels /tmp/ort-extract
          mkdir -p /tmp/ort-wheels /tmp/ort-extract

          # Cross-compile targets (aarch64-linux built on ubuntu-latest)
          # cannot `pip install` the foreign wheel directly because the
          # active interpreter's tags won't accept it. Use `pip download`
          # with the right --platform tag, then unzip the wheel into a
          # staging directory. Native targets could pip-install directly
          # but using the same code path keeps the bundle story uniform
          # and verifiable.
          pip download --no-deps \
            --only-binary=:all: \
            --python-version 312 \
            --platform "${ORT_PLATFORM}" \
            --dest /tmp/ort-wheels \
            "${ORT_PACKAGE}==${ORT_VERSION}"

          # The wheel is a zip archive; extract into the staging tree so
          # the onnxruntime/capi/ layout matches what `pip install --target`
          # would have produced on a native run.
          WHEEL=$(ls /tmp/ort-wheels/*.whl | head -1)
          echo "Extracting $WHEEL"
          python -m zipfile -e "$WHEEL" /tmp/ort-extract

          # Sanity-check the libraries we need actually landed in capi/.
          CAPI=/tmp/ort-extract/onnxruntime/capi
          echo "Wheel capi/ contents:"
          ls -la "$CAPI" || true
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            test -f "$CAPI/onnxruntime.dll" \
              || { echo "::error::onnxruntime.dll missing from wheel"; exit 1; }
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            ls "$CAPI"/libonnxruntime.*.dylib >/dev/null 2>&1 \
              || { echo "::error::libonnxruntime.*.dylib missing from wheel"; exit 1; }
          else
            ls "$CAPI"/libonnxruntime.so.*.* >/dev/null 2>&1 \
              || { echo "::error::libonnxruntime.so.*.* missing from wheel"; exit 1; }
          fi
          if [[ "$INCLUDE_MIGRAPHX" == "true" ]]; then
            test -f "$CAPI/libonnxruntime_providers_migraphx.so" \
              || { echo "::error::MIGraphX provider .so missing from wheel"; exit 1; }
            test -f "$CAPI/libonnxruntime_providers_shared.so" \
              || { echo "::error::providers_shared .so missing from wheel"; exit 1; }
            echo "MIGraphX provider libs verified"
          fi
          echo "ORT wheel extraction complete"

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p leindex -p leindex-embed --features leindex/onnx,leindex-embed/onnx

      - name: Strip binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          STRIP="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            STRIP="aarch64-linux-gnu-strip"
          fi
          $STRIP target/${{ matrix.target }}/release/leindex
          $STRIP target/${{ matrix.target }}/release/leindex-embed

      # ── Verify binaries: no NEEDED libonnxruntime, no $ORIGIN rpath ──
      # VAL-RELEASE-012/013: with load-dynamic, the produced binaries
      # MUST NOT carry a `NEEDED libonnxruntime.so.*` entry (ORT is
      # dlopen'd at runtime) and MUST NOT carry a `$ORIGIN` rpath
      # (the load-dynamic discovery chain replaces rpath-based lookup).
      # We block the bundle from being archived until these invariants
      # hold; failing here means a regression in build.rs / .cargo/config.
      - name: Verify binaries (no NEEDED libonnxruntime, no $ORIGIN rpath)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          BIN_DIR="target/${{ matrix.target }}/release"
          for bin in leindex leindex-embed; do
            echo "Inspecting $BIN_DIR/$bin ..."
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              LOAD_DEPS=$(otool -L "$BIN_DIR/$bin")
              # 1. No linked ONNX Runtime dylib (ORT is dlopen'd).
              if echo "$LOAD_DEPS" | grep -i onnxruntime; then
                echo "::error::$bin links libonnxruntime (expected load-dynamic)"
                exit 1
              fi
              echo "  OK: no linked libonnxruntime in $bin"
              # 2. No loader-relative rpath standing in for bundle lookup.
              LOAD_COMMANDS=$(otool -l "$BIN_DIR/$bin")
              RPATH_ENTRIES=$(echo "$LOAD_COMMANDS" | awk '/LC_RPATH/{flag=1} flag && /path /{print; flag=0}')
              if echo "$RPATH_ENTRIES" | grep -Eq '\$ORIGIN|@loader_path'; then
                echo "::error::$bin carries a loader-relative rpath entry: $RPATH_ENTRIES"
                exit 1
              fi
              if [[ -n "$RPATH_ENTRIES" ]]; then
                echo "  (non-loader-relative rpath entries are allowed): $RPATH_ENTRIES"
              fi
              echo "  OK: no loader-relative rpath in $bin"
            else
              DYNAMIC_SECTION=$(readelf -d "$BIN_DIR/$bin")
              # 1. No NEEDED entry for libonnxruntime (ORT is dlopen'd).
              if echo "$DYNAMIC_SECTION" | grep -E 'NEEDED' | grep -i onnxruntime; then
                echo "::error::$bin has a NEEDED entry for libonnxruntime (expected load-dynamic)"
                echo "$DYNAMIC_SECTION" | grep -i onnxruntime || true
                exit 1
              fi
              echo "  OK: no NEEDED libonnxruntime in $bin"
              # 2. No $ORIGIN rpath (load-dynamic discovery chain replaces it).
              RPATH_ENTRIES=$(echo "$DYNAMIC_SECTION" | grep -Ei 'rpath|runpath' || true)
              if echo "$RPATH_ENTRIES" | grep -q '\$ORIGIN'; then
                echo "::error::$bin carries a \$ORIGIN rpath entry: $RPATH_ENTRIES"
                exit 1
              fi
              if [[ -n "$RPATH_ENTRIES" ]]; then
                echo "  (non-\$ORIGIN rpath entries are allowed): $RPATH_ENTRIES"
              fi
              echo "  OK: no \$ORIGIN rpath in $bin"
            fi
          done

      - name: Package release bundle
        shell: bash
        env:
          INCLUDE_MIGRAPHX: ${{ matrix.include_migraphx }}
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          EXT="${{ matrix.asset_name == 'windows-x86_64' && '.exe' || '' }}"
          BUNDLE_DIR="leindex-${VERSION}-${{ matrix.asset_name }}"
          mkdir -p "$BUNDLE_DIR/bin" "$BUNDLE_DIR/lib" "$BUNDLE_DIR/models"

          # Copy both binaries
          cp "target/${{ matrix.target }}/release/leindex${EXT}" "$BUNDLE_DIR/bin/leindex${EXT}"
          cp "target/${{ matrix.target }}/release/leindex-embed${EXT}" "$BUNDLE_DIR/bin/leindex-embed${EXT}"

          # ── Copy ORT runtime libraries into lib/ ──
          # VAL-RELEASE-005/011: ORT is extracted from the pip wheel (above)
          # and bundled so users get a working neural path without a separate
          # pip install. The worker discovers these via the sibling bundle
          # lib/ path (`bin/../lib`).
          #
          # The pip wheels only ship the versioned file
          # (libonnxruntime.so.1.25.0 / libonnxruntime.1.25.0.dylib). We
          # synthesize the versioned and unversioned symlinks the
          # load-dynamic discovery chain falls back to:
          #   libonnxruntime.so.1 -> libonnxruntime.so.1.25.0
          #   libonnxruntime.so   -> libonnxruntime.so.1
          # This matches how `apt install libonnxruntime` lays the files
          # out under /usr/local/lib.
          CAPI=/tmp/ort-extract/onnxruntime/capi
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            # onnxruntime.dll and the shared providers dll. Windows does
            # not use SONAME symlinks; the basename is sufficient.
            cp "$CAPI"/onnxruntime.dll "$BUNDLE_DIR/lib/" 2>/dev/null \
              || echo "::warning::onnxruntime.dll not found in wheel capi/"
            cp "$CAPI"/onnxruntime_providers_shared.dll "$BUNDLE_DIR/lib/" 2>/dev/null || true
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            # macOS wheels ship libonnxruntime.<ver>.dylib only. Lay down
            # the versioned file, then add the bare .dylib symlink so the
            # worker's dyld fallback (`dlopen("libonnxruntime.dylib")`)
            # resolves.
            cp "$CAPI"/libonnxruntime.*.dylib "$BUNDLE_DIR/lib/" 2>/dev/null \
              || echo "::warning::libonnxruntime.*.dylib not found in wheel capi/"
            (cd "$BUNDLE_DIR/lib" && \
              VER_FILE=$(ls libonnxruntime.*.dylib | sort -V | tail -1) && \
              [[ -n "$VER_FILE" ]] && \
              ln -sf "$VER_FILE" libonnxruntime.dylib)
            cp "$CAPI"/libonnxruntime_providers_shared.dylib "$BUNDLE_DIR/lib/" 2>/dev/null || true
          else
            # Linux: copy the versioned .so file, then synthesize the
            # libonnxruntime.so.1 (soname) and libonnxruntime.so (linker
            # name) symlinks so the bundle matches a system install.
            cp "$CAPI"/libonnxruntime.so.*.* "$BUNDLE_DIR/lib/" 2>/dev/null \
              || echo "::warning::libonnxruntime.so.*.* not found in wheel capi/"
            (cd "$BUNDLE_DIR/lib" && \
              VER_FILE=$(ls libonnxruntime.so.*.* 2>/dev/null | sort -V | tail -1) && \
              if [[ -n "$VER_FILE" ]]; then \
                SONAME=$(echo "$VER_FILE" | sed -E 's/((libonnxruntime\.so\.[0-9]+)\.[0-9]+\.[0-9]+)/\2/') && \
                ln -sf "$VER_FILE" "$SONAME" && \
                ln -sf "$SONAME" libonnxruntime.so; \
              fi)
            cp "$CAPI"/libonnxruntime_providers_shared.so "$BUNDLE_DIR/lib/" 2>/dev/null || true
            # VAL-RELEASE-006: the linux-x86_64 (AMD) bundle additionally
            # ships the MIGraphX provider .so so the AMD execution
            # provider path works out of the box on ROCm systems. The
            # wheel for this target is onnxruntime-migraphx which already
            # contains the provider; copy it through explicitly so a
            # non-MIGraphX wheel cannot silently strip it.
            if [[ "$INCLUDE_MIGRAPHX" == "true" ]]; then
              cp -P "$CAPI"/libonnxruntime_providers_migraphx.so "$BUNDLE_DIR/lib/" 2>/dev/null \
                || echo "::warning::libonnxruntime_providers_migraphx.so not found in wheel capi/"
            fi
          fi
          echo "Bundle lib/ contents:"
          ls -la "$BUNDLE_DIR/lib/"

          # Copy model assets
          cp models/qwen3-embed-0.6b.onnx "$BUNDLE_DIR/models/"
          cp models/tokenizer.json "$BUNDLE_DIR/models/"
          cp models/config.json "$BUNDLE_DIR/models/"
          cp models/checksums.sha256 "$BUNDLE_DIR/models/" 2>/dev/null || echo "::warning::models/checksums.sha256 not found — bundle will lack integrity checksums"
          cp models/LICENSE "$BUNDLE_DIR/models/" 2>/dev/null || echo "::warning::models/LICENSE not found — bundle will lack model license"

          # ── INSTALL.txt quick-start doc ──
          # VAL-RELEASE-008: every bundle ships an INSTALL.txt at the root
          # explaining the layout, the install.sh path, the leindex setup
          # command, and the ORT discovery chain so a user who extracts
          # the archive directly can get to a working install.
          cat > "$BUNDLE_DIR/INSTALL.txt" <<EOF
          LeIndex $VERSION — ${{ matrix.asset_name }}
          ==========================================

          LeIndex is a code intelligence tool providing semantic and lexical
          (TF-IDF) search over your source tree. This bundle contains:

            bin/        leindex and leindex-embed binaries
            lib/        ONNX Runtime shared libraries (loaded dynamically)
            models/     qwen3-embed-0.6b.onnx + tokenizer + config
            INSTALL.txt this file

          QUICK START
          -----------

          1. Add this directory to your PATH (or copy bin/leindex and
             bin/leindex-embed to ~/.cargo/bin/):

               export PATH="$PWD/$BUNDLE_DIR/bin:\$PATH"

          2. TF-IDF search works immediately. Index a project and search:

               leindex index /path/to/project
               leindex search "authentication" --path /path/to/project

          3. To enable neural (semantic) search, run the setup wizard.
             The bundled lib/ ONNX Runtime is discovered automatically
             through the load-dynamic discovery chain
             (ORT_DYLIB_PATH env, ~/.leindex/config/leindex.toml,
             bundled lib/, sibling-to-binary, pip site-packages, system
             paths). Setting up records the discovered ORT in config:

               leindex setup --neural --cpu         # CPU ORT
               leindex setup --neural --gpu amd     # AMD/ROCm MIGraphX
               leindex setup --neural --gpu nvidia  # NVIDIA CUDA
               leindex setup --check                # print current status

          4. After setup, search returns neural-scored results:

               leindex search "authentication" --path /path/to/project

          ALTERNATIVE INSTALL PATHS
          -------------------------

            cargo install leindex     # builds from source (no ORT needed at build time)
            npm install -g @leindex/mcp
            pip install leindex

          TROUBLESHOOTING
          ---------------

          If neural search is unavailable, LeIndex falls back to TF-IDF
          and prints a one-time notice. To diagnose:

               leindex setup --check         # status report
               leindex diagnostics           # resolved ORT path + version
               export ORT_DYLIB_PATH=/path/to/libonnxruntime.so   # manual override

          See docs/NEURAL_SETUP.md in the repository for full guidance.
          EOF

          # ── Per-file SHA256 checksums inside the bundle ──
          # VAL-RELEASE-009: a top-level SHA256SUMS is generated at the
          # release level (covering each archive), AND each bundle
          # carries a per-file checksum manifest covering bin/, lib/, and
          # models/ so end users can verify any single artifact. This is
          # generated BEFORE archiving so it ships inside the tarball.
          #
          # The output file `checksums.sha256` lives at the bundle root;
          # we exclude only that path so the model's own
          # `models/checksums.sha256` (when shipped from HuggingFace)
          # remains checksummed.
          (
            cd "$BUNDLE_DIR"
            find bin lib models -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | grep -v '/checksums\.sha256$' \
              > checksums.sha256
          )
          echo "Bundle checksums.sha256:"
          cat "$BUNDLE_DIR/checksums.sha256"

          # Create archive
          if [ "${{ matrix.asset_name }}" = "windows-x86_64" ]; then
            7z a -tzip "${BUNDLE_DIR}.zip" "$BUNDLE_DIR"
          else
            tar czf "${BUNDLE_DIR}.tar.gz" "$BUNDLE_DIR"
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.asset_name }}
          path: |
            leindex-*.tar.gz
            leindex-*.zip
          if-no-files-found: error

  # ── Create GitHub Release (draft) ────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.needs_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          shopt -s nullglob
          sha256sum leindex-*.tar.gz leindex-*.zip > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since ${PREV_TAG}:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}" >> CHANGELOG.md
          else
            echo "Initial release." >> CHANGELOG.md
          fi

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.detect.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            release-artifacts/leindex-*.tar.gz
            release-artifacts/leindex-*.zip
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ─────────────────────────────────────────────
  crates-io:
    name: Publish crates.io
    needs: [detect, github-release]
    if: needs.detect.outputs.needs_crates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish leindex-embed to crates.io
        run: |
          VERSION=$(grep '^version =' crates/leindex-embed/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if cargo search leindex-embed 2>/dev/null | grep -q "^leindex-embed = \"${VERSION}\""; then
            echo "Version ${VERSION} of leindex-embed already published to crates.io — skipping"
          else
            OUTPUT=$(cargo publish --allow-dirty -p leindex-embed 2>&1) || {
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "Version ${VERSION} already published to crates.io (index lag) — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            }
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish leindex to crates.io
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if cargo search leindex 2>/dev/null | grep -q "^leindex = \"${VERSION}\""; then
            echo "Version ${VERSION} already published to crates.io — skipping"
          else
            OUTPUT=$(cargo publish --allow-dirty 2>&1) || {
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "Version ${VERSION} already published to crates.io (index lag) — skipping"
              else
                echo "$OUTPUT"
                exit 1
              fi
            }
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm package (optional — skips if NPM_TOKEN not set) ─────
  npm:
    name: Publish npm
    needs: [detect, github-release]
    if: needs.detect.outputs.needs_npm == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm-leindex-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version parity
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NPM_VERSION=$(node -p "require('./package.json').version")
          if [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, package.json=$NPM_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Publish to npm
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null | grep -q "${PKG_VER}"; then
            echo "Version ${PKG_VER} already published to npm — skipping"
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish PyPI package (thin wrapper — installs binary via cargo) ──
  pypi:
    name: Publish PyPI
    needs: [detect, github-release]
    if: needs.detect.outputs.needs_pypi == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pypi-leindex
    steps:
      - uses: actions/checkout@v4

      - name: Check PYPI_TOKEN availability
        id: check_token
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::PYPI_TOKEN not set — skipping PyPI publish"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check_token.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version parity
        if: steps.check_token.outputs.available == 'true'
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYPI_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$CARGO_VERSION" != "$PYPI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, pyproject.toml=$PYPI_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Install build tools
        if: steps.check_token.outputs.available == 'true'
        run: pip install build twine

      - name: Build package
        if: steps.check_token.outputs.available == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_token.outputs.available == 'true'
        run: |
          PYPI_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PKG_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          if pip install "${PKG_NAME}==${PYPI_VER}" --dry-run 2>&1 | grep -q "Would install"; then
            echo "Version ${PYPI_VER} already on PyPI — skipping upload"
          else
            twine upload dist/* --non-interactive
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Final summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [detect, github-release, crates-io, npm, pypi]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if all surfaces already published
        id: check_all
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          NEEDS_BUILD="${{ needs.detect.outputs.needs_build }}"
          NEEDS_CRATES="${{ needs.detect.outputs.needs_crates }}"
          NEEDS_NPM="${{ needs.detect.outputs.needs_npm }}"
          NEEDS_PYPI="${{ needs.detect.outputs.needs_pypi }}"

          if [ "$NEEDS_BUILD" = "false" ] && [ "$NEEDS_CRATES" = "false" ] && [ "$NEEDS_NPM" = "false" ] && [ "$NEEDS_PYPI" = "false" ]; then
            echo "all_published=true" >> "$GITHUB_OUTPUT"
            echo "## ✅ All surfaces already at v${VERSION}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No publishing needed — all registries and GitHub Release are up to date." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "all_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify HEAD matches release commit
        if: needs.github-release.result == 'success' && steps.check_all.outputs.all_published != 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          RELEASE_SHA=$(gh release view "v${VERSION}" --json targetCommitish --jq '.targetCommitish')
          BRANCH_HEAD_SHA=$(git ls-remote origin "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')
          if [ "$RELEASE_SHA" != "$BRANCH_HEAD_SHA" ]; then
            echo "::warning::Release SHA ($RELEASE_SHA) != ${GITHUB_REF_NAME} HEAD ($BRANCH_HEAD_SHA)"
            echo "New commits landed during release — proceeding with undraft anyway."
          else
            echo "SHA verified: $BRANCH_HEAD_SHA"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        if: needs.github-release.result == 'success' && steps.check_all.outputs.all_published != 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          gh release edit "v${VERSION}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        if: steps.check_all.outputs.all_published != 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "## 🚀 Release v${VERSION} Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| crates.io | ${{ needs.crates-io.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm | ${{ needs.npm.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PyPI | ${{ needs.pypi.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Registry notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **crates.io**: Publishes the Rust crate (required)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI**: Thin Python wrapper that bootstraps cargo install (optional — needs PYPI_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm**: Binary wrapper with GH Release download (optional — needs NPM_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Bundle topology" >> "$GITHUB_STEP_SUMMARY"
          echo "Each platform archive includes \`leindex\`, \`leindex-embed\` (ONNX worker), and model assets." >> "$GITHUB_STEP_SUMMARY"

  # ── Update version badge ─────────────────────────────────────────────
  badge:
    name: Update version badge
    needs: [detect, summary]
    if: always() && needs.detect.outputs.version != ''
    runs-on: ubuntu-latest
    steps:
      - name: Generate version badge SVG
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          cat > version-badge.svg << 'SVGEOF'
          <svg xmlns="http://www.w3.org/2000/svg" width="150" height="20">
            <rect width="150" height="20" rx="3" fill="#555"/>
            <rect x="55" width="95" height="20" rx="3" fill="#4c1"/>
            <text x="27" y="14" fill="#fff" font-family="Verdana,sans-serif" font-size="11" text-anchor="middle">release</text>
            <text x="102" y="14" fill="#fff" font-family="Verdana,sans-serif" font-size="11" text-anchor="middle">vVERSION_PLACEHOLDER</text>
          </svg>
          SVGEOF
          sed -i "s/vVERSION_PLACEHOLDER/v${VERSION}/g" version-badge.svg

      - name: Push badge to badges branch
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          git init .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version-badge.svg
          git commit -m "v${VERSION}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:refs/heads/badges
