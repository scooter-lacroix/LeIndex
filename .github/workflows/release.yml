name: Release

on:
  push:
    branches: [master]
    paths:
      # Only trigger when version-carrying or publishable files change
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'packages/**'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Detect version bump ──────────────────────────────────────────────
  # ── Verify version parity across published surfaces ────────────────
  version-parity:
    name: Verify published-surface versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Cargo / npm / PyPI versions match
        run: |
          set -e
          CARGO_VER=$(grep -m1 '^version' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          NPM_VER=$(python3 -c "import json; print(json.load(open('packages/npm-leindex-mcp/package.json'))['version'])" 2>/dev/null || echo "MISSING")
          PYPI_VER=$(python3 -c "import tomllib; print(tomllib.load(open('packages/pypi-leindex/pyproject.toml','rb'))['project']['version'])" 2>/dev/null || echo "MISSING")
          echo "Cargo: ${CARGO_VER}  npm: ${NPM_VER}  PyPI: ${PYPI_VER}"
          if [ "$CARGO_VER" != "$NPM_VER" ] || [ "$CARGO_VER" != "$PYPI_VER" ]; then
            echo "ERROR: Version mismatch! Cargo=$CARGO_VER npm=$NPM_VER PyPI=$PYPI_VER"
            exit 1
          fi
          echo "All versions match: ${CARGO_VER}"

  # ── Detect version bump ──────────────────────────────────────────────
  detect:
    name: Detect version change
    needs: [version-parity]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      changed: ${{ steps.ver.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for tag listing and changelog

      - name: Extract version from Cargo.toml
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Fetch all tags explicitly (ensures tag list is accurate)
          git fetch --tags

          # Check if a published (non-draft) release for this version already exists
          if gh release view "v${VERSION}" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q false; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Published release v${VERSION} already exists — skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "New version or draft-only: v${VERSION}"
          fi

  # ── Build native binaries (main + worker) ────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation dependencies (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binaries
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p leindex -p leindex-embed --features leindex-embed/onnx

      - name: Strip binaries (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          STRIP="strip"
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            STRIP="aarch64-linux-gnu-strip"
          fi
          $STRIP target/${{ matrix.target }}/release/leindex
          $STRIP target/${{ matrix.target }}/release/leindex-embed

      - name: Download model assets
        shell: bash
        run: |
          set -e
          MODELS_DIR="models"
          mkdir -p "$MODELS_DIR"
          # Model assets are gitignored so checkout won't include them.
          # Try to fetch from a prior GitHub Release first, then HuggingFace.
          HF_REPO="onnx-community/Qwen3-Embedding-0.6B-ONNX"
          if [[ -f "$MODELS_DIR/qwen3-embed-0.6b.onnx" ]]; then
            echo "Model assets already present in repository"
          else
            echo "Model assets not in repo — attempting to fetch from prior release..."
            # Fetch latest non-draft release tag
            TAG=$(gh release list --limit 10 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName' | head -1)
            if [[ -n "$TAG" ]]; then
              echo "Downloading model assets from release $TAG..."
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "*.onnx" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "tokenizer.json" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "config.json" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "checksums.sha256" 2>/dev/null || true
              gh release download "$TAG" --dir "$MODELS_DIR" --pattern "LICENSE" 2>/dev/null || true
            fi
            # Fall back to HuggingFace download if still missing
            if [[ ! -f "$MODELS_DIR/qwen3-embed-0.6b.onnx" ]]; then
              echo "Downloading ONNX model from HuggingFace (${HF_REPO})..."
              curl --fail --location --progress-bar -o "$MODELS_DIR/qwen3-embed-0.6b.onnx" \
                "https://huggingface.co/${HF_REPO}/resolve/main/onnx/model.onnx"
            fi
            if [[ ! -f "$MODELS_DIR/tokenizer.json" ]]; then
              echo "Downloading tokenizer from HuggingFace..."
              curl --fail --location --progress-bar -o "$MODELS_DIR/tokenizer.json" \
                "https://huggingface.co/${HF_REPO}/resolve/main/tokenizer.json"
            fi
            if [[ ! -f "$MODELS_DIR/config.json" ]]; then
              echo "Downloading config from HuggingFace..."
              curl --fail --location --progress-bar -o "$MODELS_DIR/config.json" \
                "https://huggingface.co/${HF_REPO}/resolve/main/config.json"
            fi
            if [[ ! -f "$MODELS_DIR/checksums.sha256" ]]; then
              echo "Downloading checksums from HuggingFace..."
              curl --fail --location --progress-bar -o "$MODELS_DIR/checksums.sha256" \
                "https://huggingface.co/${HF_REPO}/resolve/main/checksums.sha256" \
                || true
            fi
            if [[ ! -f "$MODELS_DIR/LICENSE" ]]; then
              echo "Downloading LICENSE from HuggingFace..."
              curl --fail --location --progress-bar -o "$MODELS_DIR/LICENSE" \
                "https://huggingface.co/${HF_REPO}/resolve/main/LICENSE" \
                || true
            fi
            echo "Model assets ready at $MODELS_DIR"
          fi

      - name: Package release bundle
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          EXT="${{ matrix.asset_name == 'windows-x86_64' && '.exe' || '' }}"
          BUNDLE_DIR="leindex-${VERSION}-${{ matrix.asset_name }}"
          mkdir -p "$BUNDLE_DIR/bin" "$BUNDLE_DIR/models"

          # Copy both binaries
          cp "target/${{ matrix.target }}/release/leindex${EXT}" "$BUNDLE_DIR/bin/leindex${EXT}"
          cp "target/${{ matrix.target }}/release/leindex-embed${EXT}" "$BUNDLE_DIR/bin/leindex-embed${EXT}"

          # Copy model assets
          cp models/qwen3-embed-0.6b.onnx "$BUNDLE_DIR/models/"
          cp models/tokenizer.json "$BUNDLE_DIR/models/"
          cp models/config.json "$BUNDLE_DIR/models/"
          cp models/checksums.sha256 "$BUNDLE_DIR/models/"
          cp models/LICENSE "$BUNDLE_DIR/models/"

          # Create archive
          if [ "${{ matrix.asset_name }}" = "windows-x86_64" ]; then
            7z a -tzip "${BUNDLE_DIR}.zip" "$BUNDLE_DIR"
          else
            tar czf "${BUNDLE_DIR}.tar.gz" "$BUNDLE_DIR"
          fi
          echo "BUNDLE_DIR=$BUNDLE_DIR" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.asset_name }}
          path: |
            leindex-*.tar.gz
            leindex-*.zip
          if-no-files-found: error

  # ── Create GitHub Release (draft) ────────────────────────────────────
  github-release:
    name: GitHub Release
    needs: [detect, build]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: bundle-*
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          shopt -s nullglob
          sha256sum leindex-*.tar.gz leindex-*.zip > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)

          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          if [ -n "$PREV_TAG" ]; then
            echo "Changes since ${PREV_TAG}:" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}" >> CHANGELOG.md
          else
            echo "Initial release." >> CHANGELOG.md
          fi

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: v${{ needs.detect.outputs.version }}
          body_path: CHANGELOG.md
          draft: true
          prerelease: false
          files: |
            release-artifacts/leindex-*.tar.gz
            release-artifacts/leindex-*.zip
            SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish to crates.io ─────────────────────────────────────────────
  crates-io:
    name: Publish crates.io
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: publish-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish leindex-embed to crates.io
        run: |
          VERSION=$(grep '^version =' crates/leindex-embed/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if cargo search leindex-embed 2>/dev/null | grep -q "^leindex-embed = \"${VERSION}\""; then
            echo "Version ${VERSION} of leindex-embed already published to crates.io — skipping"
          else
            cargo publish --allow-dirty -p leindex-embed
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish leindex to crates.io
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if cargo search leindex 2>/dev/null | grep -q "^leindex = \"${VERSION}\""; then
            echo "Version ${VERSION} already published to crates.io — skipping"
          else
            cargo publish --allow-dirty
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish npm package (optional — skips if NPM_TOKEN not set) ─────
  npm:
    name: Publish npm
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm-leindex-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Check NPM_TOKEN availability
        id: check_token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ NPM_TOKEN not set — skipping npm publish"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.check_token.outputs.available == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version parity
        if: steps.check_token.outputs.available == 'true'
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          NPM_VERSION=$(node -p "require('./package.json').version")
          if [ "$CARGO_VERSION" != "$NPM_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, package.json=$NPM_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Publish to npm
        if: steps.check_token.outputs.available == 'true'
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null | grep -q "${PKG_VER}"; then
            echo "Version ${PKG_VER} already published to npm — skipping"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Publish PyPI package (thin wrapper — installs binary via cargo) ──
  pypi:
    name: Publish PyPI
    needs: [detect, github-release]
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pypi-leindex
    steps:
      - uses: actions/checkout@v4

      - name: Check PYPI_TOKEN availability
        id: check_token
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$PYPI_TOKEN" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ PYPI_TOKEN not set — skipping PyPI publish"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Python
        if: steps.check_token.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Verify version parity
        if: steps.check_token.outputs.available == 'true'
        run: |
          CARGO_VERSION=$(grep '^version =' ../../Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYPI_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$CARGO_VERSION" != "$PYPI_VERSION" ]; then
            echo "::error::Version mismatch: Cargo.toml=$CARGO_VERSION, pyproject.toml=$PYPI_VERSION"
            exit 1
          fi
          echo "Versions match: v${CARGO_VERSION}"

      - name: Install build tools
        if: steps.check_token.outputs.available == 'true'
        run: pip install build twine

      - name: Build package
        if: steps.check_token.outputs.available == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_token.outputs.available == 'true'
        run: |
          PYPI_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          PKG_NAME=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          if pip install "${PKG_NAME}==${PYPI_VER}" --dry-run 2>&1 | grep -q "Would install"; then
            echo "Version ${PYPI_VER} already on PyPI — skipping upload"
          else
            twine upload dist/* --non-interactive
          fi
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Final summary ────────────────────────────────────────────────────
  summary:
    name: Release Summary
    needs: [detect, github-release, crates-io, npm, pypi]
    if: always() && needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify HEAD matches release commit
        if: needs.github-release.result == 'success'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          RELEASE_SHA=$(gh release view "v${VERSION}" --json targetCommitish --jq '.targetCommitish')
          BRANCH_HEAD_SHA=$(git ls-remote origin "refs/heads/${GITHUB_REF_NAME}" | awk '{print $1}')
          if [ "$RELEASE_SHA" != "$BRANCH_HEAD_SHA" ]; then
            echo "ERROR: Release SHA ($RELEASE_SHA) != ${GITHUB_REF_NAME} HEAD ($BRANCH_HEAD_SHA)"
            echo "New commits landed during release — aborting undraft."
            exit 1
          fi
          echo "SHA verified: $BRANCH_HEAD_SHA"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        if: needs.github-release.result == 'success' && (needs.crates-io.result == 'success' || needs.crates-io.result == 'skipped') && (needs.pypi.result == 'success' || needs.pypi.result == 'skipped') && (needs.npm.result == 'success' || needs.npm.result == 'skipped')
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          gh release edit "v${VERSION}" --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print summary
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "## 🚀 Release v${VERSION} Pipeline" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Step | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| GitHub Release | ${{ needs.github-release.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| crates.io | ${{ needs.crates-io.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| npm | ${{ needs.npm.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PyPI | ${{ needs.pypi.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Registry notes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **crates.io**: Publishes the Rust crate (required)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PyPI**: Thin Python wrapper that bootstraps cargo install (optional — needs PYPI_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
          echo "- **npm**: Binary wrapper with GH Release download (optional — needs NPM_TOKEN)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Bundle topology" >> "$GITHUB_STEP_SUMMARY"
          echo "Each platform archive includes \`leindex\`, \`leindex-embed\` (ONNX worker), and model assets." >> "$GITHUB_STEP_SUMMARY"
