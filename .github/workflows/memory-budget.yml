# Memory-budget CI gate
#
# Runs on pull requests to enforce the memory regression contract.
# Builds in release mode, runs memcheck against the canonical small fixture,
# and uploads the report as a CI artifact for inspection.
#
# VAL-MEASURE-014: Memory-budget workflow runs on pull requests.
# VAL-MEASURE-015: Builds release and runs memcheck against small_repo.
# VAL-MEASURE-016: Uploads the memcheck report as an artifact.
# VAL-MEASURE-027: Does not require memprof.
# VAL-MEASURE-028: Linux-first scope.

name: Memory Budget

on:
  pull_request:
    branches: [master]
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**'
      - 'crates/**'
      - 'tools/memcheck/**'
      - 'tools/xtask/**'
      - 'docs/memory/**'
      - 'tests/fixtures/memcheck/**'

permissions:
  contents: read

concurrency:
  group: memory-budget-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  memcheck:
    name: Memory budget gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: memcheck-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            memcheck-${{ runner.os }}-

      - name: Download model assets
        env:
          # Authenticated HuggingFace requests get a higher rate
          # limit per IP. The token is optional — when the
          # workflow has no `HF_TOKEN` secret, unauthenticated
          # requests still work, just with a tighter per-minute
          # cap that the retry policy below absorbs.
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          mkdir -p models
          HF_REPO="onnx-community/Qwen3-Embedding-0.6B-ONNX"
          # HuggingFace serves from a CDN that returns HTTP 429
          # (Too Many Requests) under bursty CI load. The default
          # curl behaviour is to fail on the first 429, which
          # is what caused the 2026-06-02 memory-budget run to
          # fail. We:
          #   - retry up to 5 times on ANY error (the
          #     --retry-all-errors flag), so transient 429s are
          #     absorbed without manual re-runs
          #   - wait 15s between retries (--retry-delay) so we
          #     back off past the rate-limit window
          #   - cap each curl call at 5 minutes (--retry-max-time)
          #     so a wedged connection cannot stall the workflow
          #   - use --retry-connrefused so a CDN edge node that
          #     drops the TCP connection also triggers a retry
          #   - pass the token as a Bearer header when present
          #     (HF raises the per-IP cap for authenticated
          #     clients; absent the token, unauthenticated
          #     requests still work, just with tighter limits)
          HF_AUTH=()
          if [[ -n "${HF_TOKEN}" ]]; then
            HF_AUTH=(-H "Authorization: Bearer ${HF_TOKEN}")
          fi
          CURL_COMMON=(
            --fail
            --location
            --progress-bar
            --retry 5
            --retry-delay 15
            --retry-all-errors
            --retry-connrefused
            --retry-max-time 300
          )
          curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
            -o models/qwen3-embed-0.6b.onnx \
            "https://huggingface.co/${HF_REPO}/resolve/main/onnx/model.onnx"
          curl "${CURL_COMMON[@]}" "${HF_AUTH[@]}" \
            -o models/tokenizer.json \
            "https://huggingface.co/${HF_REPO}/resolve/main/tokenizer.json"

      - name: Build release binary
        run: cargo build --release -p leindex -p leindex-embed --features leindex/onnx,leindex-embed/onnx

      - name: Run memcheck against canonical fixture
        run: cargo xtask memcheck

      - name: Upload memcheck report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memcheck-report
          path: target/memcheck-report.json
          retention-days: 14
