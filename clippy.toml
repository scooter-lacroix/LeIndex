# Clippy configuration file.
#
# Lint *levels* (allow/deny/warn) no longer belong here: clippy 1.96+
# rejects the legacy top-level `allow = [...]`, `deny = [...]`, and
# `warn = [...]` array syntax. Per the Cargo `[lints]` RFC, lint levels
# are now declared in `Cargo.toml` under the `[workspace.lints.clippy]`
# table (see root `Cargo.toml`) and inherited by each workspace member via
# `[lints] workspace = true`.
#
# This file is reserved for clippy *configuration thresholds* only
# (e.g. `too-many-arguments-threshold`, `type-complexity-threshold`,
# `msrv`). The workspace currently relies on clippy's defaults, so it is
# intentionally empty. Add threshold entries here as the codebase evolves.
